<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log Monitor Live Dashboard</title>
  <style>
    :root {
      --bg-0: #0d1b2a;
      --bg-1: #1b263b;
      --panel: #24344d;
      --panel-soft: #2d4263;
      --text: #f4f7fb;
      --muted: #a8b4c7;
      --ok: #00c17a;
      --warn: #f4a300;
      --error: #ef4444;
      --debug: #38bdf8;
      --accent: #ff7a00;
      --border: rgba(255, 255, 255, 0.12);
      --shadow: 0 16px 36px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      color: var(--text);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background:
        radial-gradient(circle at 10% 15%, rgba(255, 122, 0, 0.18), transparent 30%),
        radial-gradient(circle at 88% 10%, rgba(56, 189, 248, 0.2), transparent 32%),
        linear-gradient(135deg, var(--bg-0), var(--bg-1));
      padding: 24px;
    }

    .shell {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      gap: 18px;
      animation: fadeIn 500ms ease-out;
    }

    .header {
      background: linear-gradient(145deg, rgba(36, 52, 77, 0.9), rgba(26, 39, 60, 0.9));
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    h1 {
      font-size: clamp(1.2rem, 2vw, 1.9rem);
      letter-spacing: 0.2px;
    }

    .muted {
      color: var(--muted);
      font-size: 0.95rem;
      margin-top: 4px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 11px 14px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 120ms ease, filter 120ms ease;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    button:active {
      transform: translateY(0);
    }

    .primary {
      background: linear-gradient(130deg, #ff7a00, #ff9500);
      color: #1f1300;
    }

    .secondary {
      background: linear-gradient(130deg, #38bdf8, #22d3ee);
      color: #03252f;
    }

    .ghost {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
    }

    .card {
      background: linear-gradient(145deg, var(--panel), var(--panel-soft));
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      box-shadow: var(--shadow);
      animation: popIn 400ms ease both;
    }

    .card .label {
      color: var(--muted);
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      margin-bottom: 6px;
    }

    .card .value {
      font-size: clamp(1.2rem, 1.9vw, 1.7rem);
      font-weight: 800;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .panel {
      background: linear-gradient(150deg, rgba(36, 52, 77, 0.95), rgba(22, 33, 50, 0.96));
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
      min-height: 300px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .panel h2 {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 1.03rem;
    }

    .panel-content {
      padding: 10px 12px;
      overflow: auto;
      max-height: 440px;
      font-family: Consolas, "Courier New", monospace;
      font-size: 0.87rem;
    }

    .log-line {
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      padding: 7px 0;
      display: grid;
      grid-template-columns: 64px 1fr;
      gap: 8px;
    }

    .level {
      font-weight: 700;
      text-align: center;
      border-radius: 999px;
      padding: 1px 8px;
      line-height: 20px;
      min-width: 58px;
    }

    .INFO { background: rgba(0, 193, 122, 0.22); color: #9df4cf; }
    .WARN { background: rgba(244, 163, 0, 0.22); color: #ffd996; }
    .ERROR { background: rgba(239, 68, 68, 0.22); color: #ffc3c3; }
    .DEBUG { background: rgba(56, 189, 248, 0.22); color: #bfefff; }

    .mini-chart {
      height: 240px;
      padding: 10px;
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }</style>
<body>
  <div class="shell">
    <div class="header">
      <div>
        <h1>Log Monitor — Live Dashboard</h1>
        <div class="muted">Real-time logs, timeline, and alerts</div>
      </div>
      <div class="actions">
        <button class="primary" onclick="location.reload()">Refresh</button>
        <button class="secondary" id="connectBtn">Connect WS</button>
        <button class="ghost" id="clearBtn">Clear Logs</button>
      </div>
    </div>

    <div class="cards">
      <div class="card">
        <div class="label">Total (5m)</div>
        <div class="value" id="total">0</div>
      </div>
      <div class="card">
        <div class="label">Errors (5m)</div>
        <div class="value" id="errors">0</div>
      </div>
      <div class="card">
        <div class="label">Warnings (5m)</div>
        <div class="value" id="warns">0</div>
      </div>
      <div class="card">
        <div class="label">P95 RT</div>
        <div class="value" id="p95">0ms</div>
      </div>
      <div class="card">
        <div class="label">Services</div>
        <div class="value" id="services">-</div>
      </div>
    </div>

    <div class="grid">
      <div class="panel">
        <h2>Timeline (per-minute)</h2>
        <div class="panel-content" id="timeline"></div>
      </div>
      <div class="panel">
        <h2>Top Errors</h2>
        <div class="panel-content" id="topErrors"></div>
      </div>
    </div>

    <div class="grid">
      <div class="panel">
        <h2>Live Log Stream</h2>
        <div class="panel-content" id="stream"></div>
      </div>
      <div class="panel">
        <h2>Alerts</h2>
        <div class="panel-content" id="alerts"></div>
      </div>
    </div>
  </div>

  <script>
    const API = '/';
    async function loadStats() {
      const s = await fetch(`${API}api/stats`).then(r => r.json());
      document.getElementById('total').innerText = s.total || 0;
      document.getElementById('errors').innerText = s.ERROR || 0;
      document.getElementById('warns').innerText = s.WARN || 0;
      document.getElementById('p95').innerText = (s.p95ResponseTime || s.p95 || 0) + 'ms';
      fetch(`${API}api/services`).then(r => r.json()).then(arr => { document.getElementById('services').innerText = arr.join(', '); });
    }
    async function loadTimeline() {
      const t = await fetch(`${API}api/timeline?minutes=30`).then(r => r.json());
      const el = document.getElementById('timeline');
      el.innerHTML = t.map(b => `<div style="display:flex;justify-content:space-between;padding:6px 0"><div>${b.time}</div><div>${b.total}</div></div>`).join('');
    }
    async function loadTop() {
      const e = await fetch(`${API}api/top-errors?limit=10`).then(r => r.json());
      const el = document.getElementById('topErrors');
      el.innerHTML = e.map(x => `<div style="padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04)"><strong>${x.count}</strong> ${x.message.slice(0,120)}</div>`).join('');
    }
    function addLog(l) {
      const el = document.getElementById('stream');
      const div = document.createElement('div');
      div.className = 'log-line';
      div.innerHTML = `<div class="level ${l.level}">${l.level}</div><div><div style="font-weight:700">${l.message}</div><div style="color:var(--muted);font-size:0.85rem">${l.timestamp} • ${l.service}</div></div>`;
      el.prepend(div);
      while (el.children.length > 300) el.removeChild(el.lastChild);
    }

    document.getElementById('connectBtn').addEventListener('click', () => {
      const ws = new WebSocket(`ws://${location.host}/ws/logs`);
      ws.onmessage = (ev) => {
        const msg = JSON.parse(ev.data);
        if (msg.type === 'history') msg.logs.forEach(addLog);
        if (msg.type === 'log') addLog(msg.log);
      };
    });

    document.getElementById('clearBtn').addEventListener('click', () => fetch('/api/logs', { method: 'DELETE' }).then(loadStats).then(loadTop).then(loadTimeline));

    setInterval(() => { loadStats(); loadTimeline(); loadTop(); }, 5000);
    loadStats(); loadTimeline(); loadTop();
  </script>
</body>
</html>
